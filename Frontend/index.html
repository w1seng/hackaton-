<!DOCTYPE html>
<html lang="uk" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniNexus AI | Smart Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        accentDark: '#bc83e6',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s ease; position: relative; }
        #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; overflow: hidden; }
        .stars, .stars2, .stars3 { position: absolute; top: -100%; left: 0; width: 150%; height: 200%; background-repeat: repeat; background-size: 250px 250px; opacity: 0.2; }
        .stars { 
            background-image: radial-gradient(3px 3px at 20px 30px, #eee, rgba(0,0,0,0)), radial-gradient(4px 4px at 40px 70px, #fff, rgba(0,0,0,0));
            animation: animateStars 40s linear infinite; 
        }
        #ai-response h1, #ai-response h2, #ai-response h3 {
    font-weight: 800;
    margin-top: 1rem;
    margin-bottom: 0.5rem;
    color: #bc83e6; /* Твій акцентний колір */
}
#ai-response ul {
    list-style-type: disc;
    margin-left: 1.5rem;
}
        .stars2 { background-image: inherit; animation: animateStars 60s linear infinite; opacity: 0.15; }
        .stars3 { background-image: inherit; animation: animateStars 80s linear infinite; opacity: 0.1; }
        @keyframes animateStars { from { transform: translateY(0px); } to { transform: translateY(100%); } }
        .dark .stars, .dark .stars2, .dark .stars3 { opacity: 0.8; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .dark .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
        .flash-button { position: relative; overflow: hidden; }
        .flash-button::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
        }
        .flash-button:hover::after { animation: shine 0.75s ease-in-out; }
        @keyframes shine { 100% { left: 125%; } }
        #ai-response::-webkit-scrollbar { width: 4px; }
        #ai-response::-webkit-scrollbar-thumb { background: #bc83e6; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#F1F5F9] dark:bg-slate-950 text-slate-900 dark:text-slate-100 h-screen overflow-hidden flex transition-colors duration-300">

    <div id="starfield"><div class="stars"></div><div class="stars2"></div><div class="stars3"></div></div>
    
    <!-- ПРИХОВАНИЙ INPUT -->
    <input type="file" id="file-input" accept="application/pdf, image/*" class="hidden">

    <!-- ЛІВА ПАНЕЛЬ (РОЗКЛАД) -->
    <nav class="w-20 lg:w-80 glass-panel border-r border-slate-200 dark:border-slate-800 flex flex-col transition-all duration-300 z-10">
        <div class="p-5 flex items-center justify-between gap-3 border-b border-slate-100 dark:border-slate-800/50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 dark:bg-accentDark rounded-xl flex items-center justify-center text-white shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                </div>
                <span class="text-lg font-bold tracking-tight hidden lg:block text-blue-600 dark:text-accentDark">UniNexus AI</span>
            </div>
            <button id="theme-toggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                <span id="theme-icon">🌙</span>
            </button>
        </div>

        <div class="p-4 border-b border-slate-100 dark:border-slate-800/50 hidden lg:block">
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 block">Обрати дату</label>
            <input type="date" id="date-picker" class="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-accentDark transition-all">
        </div>

        <div class="flex-grow px-3 py-4 flex flex-col overflow-y-auto">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-2 mb-3">Розклад на день</p>
            <div id="schedule-container" class="space-y-2 flex-grow">
                <div class="text-center py-10 text-slate-400 text-xs italic">Оберіть групу в профілі</div>
            </div>
        </div>
    </nav>

    <!-- ОСНОВНА ЧАСТИНА (ТВОЯ ЛОГІКА) -->
    <main class="flex-grow flex flex-col overflow-hidden z-10">
        <div class="p-6">
            <div class="bg-gradient-to-r from-blue-600 to-indigo-700 dark:from-accentDark dark:to-purple-900 rounded-3xl p-5 text-white shadow-xl relative overflow-hidden group transition-all">
                <h3 class="font-bold text-base flex items-center gap-2 relative z-10">✨ AI Insight</h3>
                <p class="text-blue-100 dark:text-white/90 text-xs mt-1 relative z-10" id="ai-insight-text">UniNexus AI готовий до роботи. Завантажте документ.</p>
            </div>
        </div>

        <div class="flex-grow px-6 pb-6 flex flex-col gap-6 overflow-hidden">
            <div class="glass-panel border border-slate-200 dark:border-slate-800 rounded-[32px] flex-grow flex flex-col shadow-sm overflow-hidden transition-all">
                
                <div class="px-8 py-5 border-b border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/20">
                    <h2 id="course-title" class="text-xl font-black text-slate-800 dark:text-white italic uppercase tracking-tight">Робоча область</h2>
                    <p id="course-topic" class="text-[10px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest mt-1">Очікування завантаження матеріалів...</p>
                </div>
                
                <div class="p-8 flex-grow overflow-y-auto flex flex-col items-center justify-start gap-6">
                    <!-- КАРТКА ЗАВАНТАЖЕННЯ -->
                    <div id="upload-card" class="w-full max-w-xl aspect-video bg-slate-50 dark:bg-slate-900/50 rounded-3xl border-2 border-dashed border-slate-200 dark:border-slate-800 flex flex-col items-center justify-center group hover:border-blue-400 dark:hover:border-accentDark transition-all cursor-pointer transform hover:scale-[1.01]">
                        <div class="p-4 bg-white dark:bg-slate-800 rounded-2xl shadow-sm mb-3 group-hover:scale-110 transition-transform">
                            <svg class="text-slate-400 group-hover:text-blue-500 dark:group-hover:text-accentDark" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                        </div>
                        <span class="text-sm font-bold text-slate-500 dark:text-slate-400">PDF Методичка або Фото дошки</span>
                        <span class="text-[10px] text-slate-400 mt-1 uppercase tracking-tighter">Натисніть для вибору</span>
                    </div>

                    <!-- ВІДПОВІДЬ AI -->
                    <div id="ai-response" class="hidden w-full max-w-4xl p-6 rounded-3xl bg-blue-50/50 dark:bg-slate-900/80 border border-blue-100 dark:border-accentDark/20 text-sm leading-relaxed shadow-inner"></div>
                </div>

                <!-- ПОЛЕ ВВОДУ ЧАТУ -->
                <div class="p-5 glass-panel/50 border-t border-slate-100 dark:border-slate-800 mt-auto">
                    <div class="relative max-w-4xl mx-auto">
                        <input type="text" id="ai-input" placeholder="Запитай AI про цю лекцію..." class="w-full bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-700 pl-6 pr-32 py-4 rounded-2xl shadow-inner focus:ring-2 focus:ring-blue-500 dark:focus:ring-accentDark outline-none dark:text-white transition-all">
                        <button id="ask-btn" class="absolute right-2 top-2 bottom-2 bg-blue-600 dark:bg-accentDark text-white dark:text-slate-950 px-6 rounded-xl font-bold text-xs shadow-lg hover:scale-105 transition-all active:scale-95 flash-button">Запитати</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- ПРАВА ПАНЕЛЬ (ПРОФІЛЬ) -->
    <aside class="w-72 glass-panel border-l border-slate-200 dark:border-slate-800 hidden xl:flex flex-col p-6 transition-colors duration-300 z-10">
        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-slate-900 dark:bg-accentDark rounded-2xl mx-auto mb-3 flex items-center justify-center text-white dark:text-slate-950 text-xl font-black shadow-lg transition-transform hover:rotate-6">UN</div>
            <h3 class="font-bold text-sm dark:text-white italic">Олександр Несус</h3>
            <div class="mt-4 space-y-2">
                <input type="text" id="group-input" placeholder="Група (напр. ІПЗ-23-1)" class="w-full text-center bg-slate-100 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 px-3 py-2 rounded-xl text-xs font-bold outline-none uppercase focus:ring-2 focus:ring-blue-500 dark:focus:ring-accentDark">
                <button id="fetch-schedule-btn" class="w-full bg-slate-800 dark:bg-slate-700 text-white text-[10px] font-bold py-2.5 rounded-xl hover:bg-slate-700 transition uppercase tracking-wider">Оновити розклад</button>
            </div>
        </div>

        <div class="p-4 bg-blue-50/50 dark:bg-slate-900/50 rounded-2xl border border-blue-100 dark:border-slate-800">
            <h4 class="text-[10px] font-bold text-blue-900 dark:text-accentDark mb-2 uppercase tracking-tighter">Екосистема UniNexus</h4>
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-[10px] text-slate-500">RAG Engine Active</span>
            </div>
        </div>
    </aside>

<script>
    // --- 1. ТЕМА ---
    const themeToggle = document.getElementById('theme-toggle');
    const html = document.documentElement;
    const themeIcon = document.getElementById('theme-icon');
    themeToggle.addEventListener('click', () => {
        const isDark = html.classList.toggle('dark');
        themeIcon.innerText = isDark ? '☀️' : '🌙';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });
    if (localStorage.getItem('theme') === 'dark') { html.classList.add('dark'); themeIcon.innerText = '☀️'; }

    // --- 2. РОЗКЛАД (Логіка одногрупника) ---
    const datePicker = document.getElementById('date-picker');
    const groupInput = document.getElementById('group-input');
    const fetchBtn = document.getElementById('fetch-schedule-btn');
    const scheduleContainer = document.getElementById('schedule-container');
    let cachedSchedule = null;

    function formatServerKey(dateStr) {
        const d = new Date(dateStr);
        const daysUk = ['Неділя', 'Понеділок', 'Вівторок', 'Середа', 'Четвер', 'П\'ятниця', 'Субота'];
        return `${String(d.getDate()).padStart(2, '0')}.${String(d.getMonth() + 1).padStart(2, '0')}.${d.getFullYear()} ${daysUk[d.getDay()]}`;
    }

    async function loadSchedule() {
        const group = groupInput.value.trim();
        if (!group) return;
        scheduleContainer.innerHTML = `<div class="text-center py-10 animate-pulse text-[10px]">Синхронізація...</div>`;
        try {
            const res = await fetch(`http://localhost:3000/api/schedule/${group}`);
            cachedSchedule = await res.json();
            renderDay(datePicker.value);
        } catch (e) { scheduleContainer.innerHTML = `<div class="text-xs text-red-400">Помилка API</div>`; }
    }

    function renderDay(selectedDate) {
        if (!cachedSchedule) return;
        const targetKey = formatServerKey(selectedDate);
        const lessons = cachedSchedule[targetKey] || [];
        scheduleContainer.innerHTML = lessons.length ? "" : `<div class="text-center py-10 opacity-50 text-[10px] uppercase">Пар немає</div>`;
        lessons.forEach(l => {
            const div = document.createElement("div");
            div.className = "p-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 shadow-sm";
            div.innerHTML = `<p class="text-[9px] font-bold text-blue-500">${l.time}</p><h4 class="text-[11px] font-bold dark:text-white">${l.subject}</h4><p class="text-[9px] text-slate-400">${l.room || 'Дистанційно'}</p>`;
            scheduleContainer.appendChild(div);
        });
    }

    datePicker.value = new Date().toISOString().split('T')[0];
    fetchBtn.addEventListener('click', loadSchedule);
    datePicker.addEventListener('change', () => renderDay(datePicker.value));

    // --- 3. AI ТА RAG (Твоя логіка) ---
    const aiInput = document.getElementById('ai-input');
    const askBtn = document.getElementById('ask-btn');
    const aiResponse = document.getElementById('ai-response');
    const aiInsightText = document.getElementById('ai-insight-text');
    const fileInput = document.getElementById('file-input');
    const uploadCard = document.getElementById('upload-card');
    let currentImageBase64 = null;

    uploadCard.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', async function() {
        const file = this.files[0];
        if (!file) return;

        if (file.type === "application/pdf") {
            document.getElementById('course-title').innerText = "Аналізую документ...";
            uploadCard.innerHTML = `<div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500 mb-2"></div><span class="text-xs font-bold text-blue-500">UniNexus вивчає PDF...</span>`;
            
            const formData = new FormData();
            formData.append("file", file);

            try {
                const res = await fetch('http://localhost:8000/api/upload', { method: 'POST', body: formData });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('course-title').innerText = data.extracted_title || file.name;
                    document.getElementById('course-topic').innerText = `Джерело: ${file.name}`;
                    uploadCard.innerHTML = `<svg class="text-green-500 mb-2" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg><span class="text-xs font-bold text-green-500">Документ вивчено</span>`;
                    aiResponse.classList.remove('hidden');
                    aiResponse.innerHTML = `✨ Я вивчив <b>${data.extracted_title}</b>. Можеш запитувати будь-що по тексту!`;
                    updateAIInsight(data.extracted_title);
                }
            } catch (e) { uploadCard.innerHTML = `<span class="text-red-500">Помилка</span>`; }
        } else {
            const reader = new FileReader();
            reader.onloadend = () => {
                currentImageBase64 = reader.result;
                uploadCard.innerHTML = `<span class="text-purple-500 font-bold">📷 Фото дошки додано</span>`;
            };
            reader.readAsDataURL(file);
        }
    });

    async function askQuestion() {
        const query = aiInput.value;
        if (!query) return;
        askBtn.innerText = "Думаю...";
        askBtn.disabled = true;
        aiResponse.classList.remove('hidden');
        aiResponse.innerHTML = `<span class="animate-pulse">⏳ AI аналізує дані...</span>`;
        try {
            const res = await fetch('http://localhost:8000/api/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query, image_base64: currentImageBase64 })
            });
            const data = await res.json();
            aiResponse.innerHTML = `
    <div class="text-blue-600 dark:text-accentDark font-bold mb-2">UniNexus AI:</div>
    <div class="prose prose-sm dark:prose-invert max-w-none">
        ${marked.parse(data.answer)}
    </div>
`;
        } catch (e) { aiResponse.innerText = "Помилка бекенду"; }
        finally { askBtn.innerText = "Запитати"; askBtn.disabled = false; }
    }

    async function updateAIInsight(course = "твій розклад") {
        try {
            const res = await fetch('http://localhost:8000/api/schedule-alert', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ original_event: course, change_reason: "Аналіз матеріалів" })
            });
            const data = await res.json();
            aiInsightText.innerText = data.alert_message;
        } catch (e) { console.log("Insight error"); }
    }

    askBtn.addEventListener('click', askQuestion);
    aiInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') askQuestion(); });
</script>
</body>
</html>
