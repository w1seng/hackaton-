<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI_Project | Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 min-h-screen">

    <nav class="bg-white shadow-sm border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold italic">A</div>
                <span class="text-xl font-bold tracking-tight">AI_Project</span>
            </div>
            <div class="hidden md:flex items-center gap-8 text-sm font-medium">
                <a href="#" class="text-slate-600 hover:text-blue-600 transition">Головна</a>
                <a href="#" class="text-slate-600 hover:text-blue-600 transition">Сервіси</a>
                <button class="bg-slate-900 text-white px-5 py-2 rounded-lg hover:bg-slate-800 transition">Увійти</button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-16">
        
        <div class="text-center mb-12">
            <h1 class="text-4xl md:text-6xl font-black mb-4">
                Розумний аналіз від <span class="text-blue-600 italic">ШІ</span>
            </h1>
            <p class="text-slate-500 text-lg max-w-xl mx-auto">
                Введіть текст нижче, і ми покажемо магію за лічені секунди.
            </p>
        </div>

        <div class="bg-white p-2 rounded-2xl shadow-xl border border-slate-100 flex flex-col md:flex-row gap-2 mb-16">
            <input 
                type="text" 
                id="userInput"
                placeholder="Введіть ваш запит тут..." 
                class="flex-grow px-6 py-4 rounded-xl outline-none text-lg"
            >
            <button 
                id="analyzeBtn"
                class="bg-blue-600 text-white px-10 py-4 rounded-xl font-bold hover:bg-blue-700 transition flex items-center justify-center gap-2"
            >
                <span>Аналізувати</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
            </button>
        </div>

        <div id="resultsSection" class="hidden space-y-8">
            <h2 class="text-2xl font-bold border-l-4 border-blue-600 pl-4">Результати генерації</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                    <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                    </div>
                    <h3 class="font-bold mb-2">Ключові тези</h3>
                    <p class="text-sm text-slate-600">ШІ проаналізував текст і виділив головне для вашої зручності.</p>
                </div>
                </div>
        </div>
    </main>

    <script>
        const btn = document.getElementById('analyzeBtn');
        const results = document.getElementById('resultsSection');
        const input = document.getElementById('userInput');

        btn.addEventListener('click', () => {
            if(input.value.length > 2) {
                results.classList.remove('hidden');
                results.scrollIntoView({ behavior: 'smooth' });
            } else {
                alert("Напиши хоча б пару слів!");
            }
        });
    </script>
</body>
</html>
