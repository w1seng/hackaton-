<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        accentDark: '#bc83e6',
                    }
                }
            }
        }

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s ease; position: relative; }
        .transition-all-300 { transition: all 0.3s ease; }

        /* Зірковий фон */
        #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; overflow: hidden; }
        .stars, .stars2, .stars3 { position: absolute; top: -100%; left: 0; width: 150%; height: 200%; background-repeat: repeat; background-size: 250px 250px; opacity: 0.2; }
        .stars { 
            background-image: 
                radial-gradient(3px 3px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(4px 4px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2.5px 2.5px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 80px 120px, #fff, rgba(0,0,0,0)),
                radial-gradient(4px 4px at 110px 210px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2.5px 2.5px at 150px 180px, #fff, rgba(0,0,0,0));
            animation: animateStars 40s linear infinite; 
        }
        .stars2 { background-image: inherit; animation: animateStars 60s linear infinite; opacity: 0.15; background-size: 300px 300px; }
        .stars3 { background-image: inherit; animation: animateStars 80s linear infinite; opacity: 0.1; background-size: 350px 350px; }
        @keyframes animateStars { from { transform: translateY(0px) translateX(0px); } to { transform: translateY(100%) translateX(-150px); } }
        .dark .stars, .dark .stars2, .dark .stars3 { opacity: 0.8; }

        /* Ефекти кнопки та скла */
        @keyframes shine { 100% { left: 125%; } }
        .flash-button { position: relative; overflow: hidden; }
        .flash-button::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); transition: none;
        }
        .flash-button:hover::after { animation: shine 0.75s ease-in-out; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(5px); }
        .dark .glass-panel { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(5px); }
    </style>
</head>
<body class="bg-[#F1F5F9] dark:bg-slate-950 text-slate-900 dark:text-slate-100 h-screen overflow-hidden flex transition-colors duration-300">
