<!DOCTYPE html>
<html lang="uk" id="mainHtml"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniNexus AI | Smart Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Налаштування кольорів Tailwind
        tailwind.config = {
            darkMode: 'class', // Вмикаємо підтримку темної теми через клас
            theme: {
                extend: {
                    colors: {
                        elderberry: '#4D0F28', // Колір Бузина для акцентів у темній темі
                        darkBg: '#0F172A',     // Глибокий синьо-чорний для фону
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .glass { backdrop-filter: blur(10px); }
        /* Плавний перехід між темами */
        body { transition: background-color 0.3s ease, color 0.3s ease; }
    </style>
</head>
<body class="bg-[#F1F5F9] dark:bg-darkBg text-slate-900 dark:text-slate-100 h-screen overflow-hidden flex">

    <nav class="w-20 lg:w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col transition-all">
        <div class="p-6 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 dark:bg-elderberry rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200 dark:shadow-none transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                </div>
                <span class="text-xl font-bold tracking-tight hidden lg:block text-blue-600 dark:text-elderberry italic">UniNexus</span>
            </div>
            
            <button id="themeToggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:ring-2 hover:ring-blue-400 dark:hover:ring-elderberry transition-all">
                <svg id="sunIcon" class="hidden w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <svg id="moonIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
        </div>

        <div class="flex-grow px-4 space-y-2 overflow-y-auto">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-2 mb-4">Розклад</p>
            <button class="w-full text-left p-4 rounded-2xl bg-blue-50 dark:bg-elderberry/20 border border-blue-100 dark:border-elderberry/30 group transition">
                <p class="text-xs font-bold text-blue-500 dark:text-elderberry mb-1">Зараз</p>
                <h4 class="font-bold text-slate-800 dark:text-slate-200 group-hover:text-blue-600 dark:group-hover:text-elderberry transition">Вища Математика</h4>
            </button>
        </div>
    </nav>

    <main class="flex-grow flex flex-col overflow-hidden">
        <div class="p-6">
            <div class="bg-gradient-to-r from-blue-600 to-indigo-700 dark:from-elderberry dark:to-slate-900 rounded-3xl p-6 text-white shadow-xl">
                <h3 class="font-bold text-lg flex items-center gap-2">✨ AI Insight</h3>
                <p class="text-blue-100 dark:text-slate-300 text-sm mt-1">Твій сон подовжено на 1.5 години. Наступна лекція о 10:15.</p>
            </div>
        </div>

        <div class="flex-grow px-6 pb-6 flex flex-col overflow-hidden">
            <div class="bg-white dark:bg-slate-900 rounded-[32px] border border-slate-200 dark:border-slate-800 flex-grow flex flex-col shadow-sm overflow-hidden transition-colors">
                <div class="px-8 py-6 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center bg-slate-50/50 dark:bg-slate-800/30">
                    <div>
                        <h2 class="text-2xl font-black text-slate-800 dark:text-white uppercase tracking-tight">Вища Математика</h2>
                        <p class="text-sm text-slate-500 dark:text-slate-400">Тема: Інтегральне числення</p>
                    </div>
                </div>

                <div class="mt-auto p-6 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-800">
                    <div class="relative">
                        <input type="text" placeholder="Запитай AI..." 
                            class="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 pl-6 pr-32 py-4 rounded-2xl dark:text-white outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-elderberry transition-all">
                        <button class="absolute right-2 top-2 bottom-2 bg-blue-600 dark:bg-elderberry text-white px-6 rounded-xl font-bold text-sm shadow-lg shadow-blue-200 dark:shadow-none transition-colors">
                            Запитати
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');
        const html = document.getElementById('mainHtml');

        themeToggle.addEventListener('click', () => {
            // Перемикаємо клас 'dark' на тегу html
            html.classList.toggle('dark');
            
            // Змінюємо іконки
            const isDark = html.classList.contains('dark');
            if (isDark) {
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }

            // Зберігаємо вибір користувача (опціонально)
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // Перевірка збереженої теми при завантаженні
        if (localStorage.getItem('theme') === 'dark') {
            html.classList.add('dark');
            sunIcon.classList.remove('hidden');
            moonIcon.classList.add('hidden');
        }
    </script>
</body>
</html>
