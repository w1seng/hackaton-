<!DOCTYPE html>
<html lang="uk" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniNexus AI | Smart Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        accentDark: '#bc83e6',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s ease; position: relative; }
        .transition-all-300 { transition: all 0.3s ease; }

        /* Зірковий фон */
        #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; overflow: hidden; }
        .stars, .stars2, .stars3 { position: absolute; top: -100%; left: 0; width: 150%; height: 200%; background-repeat: repeat; background-size: 250px 250px; opacity: 0.2; }
        .stars { 
            background-image: 
                radial-gradient(3px 3px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(4px 4px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2.5px 2.5px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 80px 120px, #fff, rgba(0,0,0,0)),
                radial-gradient(4px 4px at 110px 210px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2.5px 2.5px at 150px 180px, #fff, rgba(0,0,0,0));
            animation: animateStars 40s linear infinite; 
        }
        .stars2 { background-image: inherit; animation: animateStars 60s linear infinite; opacity: 0.15; background-size: 300px 300px; }
        .stars3 { background-image: inherit; animation: animateStars 80s linear infinite; opacity: 0.1; background-size: 350px 350px; }
        @keyframes animateStars { from { transform: translateY(0px) translateX(0px); } to { transform: translateY(100%) translateX(-150px); } }
        .dark .stars, .dark .stars2, .dark .stars3 { opacity: 0.8; }

        /* Ефекти */
        @keyframes shine { 100% { left: 125%; } }
        .flash-button { position: relative; overflow: hidden; }
        .flash-button::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); transition: none;
        }
        .flash-button:hover::after { animation: shine 0.75s ease-in-out; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(5px); }
        .dark .glass-panel { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(5px); }
        
        /* Скролбар для чату */
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .chat-scroll::-webkit-scrollbar-thumb { background: #334155; }
    </style>
</head>
<body class="bg-[#F1F5F9] dark:bg-slate-950 text-slate-900 dark:text-slate-100 h-screen overflow-hidden flex transition-colors duration-300">

    <div id="starfield"><div class="stars"></div><div class="stars2"></div><div class="stars3"></div></div>

    <nav class="w-20 lg:w-72 glass-panel border-r border-slate-200 dark:border-slate-800 flex flex-col transition-all duration-300 z-10">
        <div class="p-6 flex items-center justify-between gap-3 border-b border-slate-100 dark:border-slate-800/50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 dark:bg-accentDark rounded-xl flex items-center justify-center text-white shadow-lg transition-all-300">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                </div>
                <span class="text-xl font-bold tracking-tight hidden lg:block text-blue-600 dark:text-accentDark transition-colors">UniNexus</span>
            </div>
            <button id="theme-toggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors"><span id="theme-icon">🌙</span></button>
        </div>

        <div class="flex-grow px-4 py-6 flex flex-col overflow-y-auto">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-2 mb-4">Сьогоднішні пари</p>
            <div id="schedule-container" class="space-y-3 flex-grow">
                </div>
        </div>
    </nav>

    <main class="flex-grow flex flex-col overflow-hidden z-10">
        <div class="p-6">
            <div class="bg-gradient-to-r from-blue-600 to-indigo-700 dark:from-accentDark dark:to-purple-900 rounded-3xl p-6 text-white shadow-xl relative overflow-hidden group">
                <h3 class="font-bold text-lg flex items-center gap-2 relative z-10"><span class="animate-pulse">✨</span> AI Workspace</h3>
                <p class="text-blue-100 dark:text-white/90 text-sm mt-1 relative z-10 italic" id="ai-insight-text">Оберіть тему лекції для початку аналізу.</p>
            </div>
        </div>

        <div class="flex-grow px-6 pb-6 flex flex-col gap-6 overflow-hidden">
            <div class="glass-panel border border-slate-200 dark:border-slate-800 rounded-[32px] flex-grow flex flex-col shadow-sm overflow-hidden transition-colors">
                
                <div id="chat-messages" class="flex-grow p-8 overflow-y-auto chat-scroll flex flex-col gap-4">
                    <div class="max-w-[80%] bg-slate-100 dark:bg-slate-800/50 p-4 rounded-2xl rounded-tl-none">
                        <p class="text-sm">Привіт! Я UniNexus AI. Завантаж свій розклад або конспект, і ми почнемо вчитись разом. 🚀</p>
                    </div>
                </div>

                <div class="p-6 glass-panel/50 border-t border-slate-100 dark:border-slate-800 mt-auto">
                    <div class="relative">
                        <input type="text" placeholder="Запитай AI про лекцію..." class="w-full bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-700 pl-6 pr-32 py-4 rounded-2xl shadow-inner focus:ring-2 focus:ring-blue-500 dark:focus:ring-accentDark outline-none dark:text-white transition-all">
                        <button class="absolute right-2 top-2 bottom-2 bg-blue-600 dark:bg-accentDark text-white dark:text-slate-950 px-6 rounded-xl font-bold text-sm shadow-lg transition-all-300 flash-button hover:scale-105 transform active:scale-95">Запитати</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <aside class="w-80 glass-panel border-l border-slate-200 dark:border-slate-800 hidden xl:flex flex-col p-8 transition-colors duration-300 overflow-y-auto z-10">
        
        <div class="text-center mb-6">
            <div class="w-20 h-20 bg-slate-900 dark:bg-accentDark rounded-[2rem] mx-auto mb-4 flex items-center justify-center text-white dark:text-slate-950 text-2xl font-black shadow-xl hover:rotate-6 hover:scale-110 transform cursor-pointer transition-all-300">UN</div>
            <h3 class="font-bold text-lg dark:text-white italic">Олександр Несус</h3>
            
            <div class="mt-4">
                <input type="text" id="group-input" placeholder="Група (ІП-24-1)" 
                    class="w-full text-center bg-slate-100 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 px-4 py-2 rounded-xl text-sm font-bold focus:ring-2 focus:ring-blue-500 dark:focus:ring-accentDark outline-none uppercase transition-all">
                <button id="fetch-schedule-btn" class="mt-2 w-full bg-slate-800 dark:bg-slate-700 text-white text-[10px] font-bold py-2 rounded-xl hover:bg-slate-700 transition uppercase tracking-wider">Оновити розклад</button>
            </div>
        </div>

        <div class="space-y-6">
            <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Матеріали лекції</p>
                <div class="grid grid-cols-1 gap-3">
                    <div class="aspect-[4/3] bg-slate-100 dark:bg-slate-800/50 rounded-2xl border-2 border-dashed border-slate-200 dark:border-slate-700 flex flex-col items-center justify-center group hover:border-blue-400 dark:hover:border-accentDark transition-all-300 cursor-pointer hover:bg-white dark:hover:bg-slate-800">
                        <svg class="text-slate-400 group-hover:text-blue-500 dark:group-hover:text-accentDark mb-2 transition-colors" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                        <span class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase">Додати фото</span>
                    </div>
                    <div id="file-list" class="space-y-2">
                        </div>
                </div>
            </div>

            <div class="p-5 bg-gradient-to-br from-slate-50 to-blue-50 dark:from-slate-800 dark:to-slate-900 rounded-3xl border border-blue-100 dark:border-slate-700">
                <h4 class="text-xs font-bold text-blue-900 dark:text-accentDark mb-2 italic uppercase">Колективний розум</h4>
                <p class="text-[10px] text-blue-700/70 dark:text-slate-400 leading-relaxed">Система готова до синхронізації з групою.</p>
            </div>
        </div>
    </aside>

    <script>
        // Код JS для теми та розкладу (залишається тим самим, що був раніше)
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const htmlElement = document.documentElement;
        themeToggle.addEventListener('click', () => {
            if (htmlElement.classList.contains('dark')) {
                htmlElement.classList.remove('dark'); themeIcon.innerText = '🌙'; localStorage.setItem('theme', 'light');
            } else {
                htmlElement.classList.add('dark'); themeIcon.innerText = '☀️'; localStorage.setItem('theme', 'dark');
            }
        });
        if (localStorage.getItem('theme') === 'dark') { htmlElement.classList.add('dark'); themeIcon.innerText = '☀️'; }

        // Робота з розкладом (JSON з попереднього кроку)
        const scheduleData = {
          "30.04.2026 Четвер": [
            { "time": "09:30", "subject": "Іноземна мова (Пр) ІП-24-1", "teacher": "Тетяна Галай", "room": "5.210" },
            { "time": "11:00", "subject": "Менеджмент проєктів (Л)", "teacher": "Роман Вовк", "room": "1.А12" },
            { "time": "12:50", "subject": "Моделювання ПЗ (Лаб)", "teacher": "Лідія Гобир", "room": "1.416" }
          ]
        };

        const fetchBtn = document.getElementById('fetch-schedule-btn');
        const scheduleContainer = document.getElementById('schedule-container');

        fetchBtn.addEventListener('click', () => {
            scheduleContainer.innerHTML = '';
            const firstDayKey = Object.keys(scheduleData)[0];
            const lessons = scheduleData[firstDayKey];
            
            lessons.forEach(lesson => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left p-4 rounded-2xl bg-blue-50 dark:bg-accentDark/10 border border-blue-100 dark:border-accentDark/30 group transition-all-300 hover:shadow-md mb-3';
                btn.innerHTML = `
                    <p class="text-[10px] font-bold text-blue-500 dark:text-accentDark mb-1">${lesson.time}</p>
                    <h4 class="font-bold text-xs text-slate-800 dark:text-slate-100 group-hover:text-blue-600 dark:group-hover:text-accentDark transition">${lesson.subject}</h4>
                    <p class="text-[9px] text-slate-500 dark:text-slate-400 mt-2">📍 ${lesson.room} • 👤 ${lesson.teacher}</p>
                `;
                scheduleContainer.appendChild(btn);
            });
            document.getElementById('ai-insight-text').innerText = "Розклад завантажено. Я готовий аналізувати лекції.";
        });
    </script>
</body>
</html>
